    <title>LinkCreator</title>

<body>
    <h2>Добро пожаловать в LinkCreator</h2>

<body>
    <hr style="margin: 30px 0;">

<body>
    <!-- ЧАСТЬ 1: ДОБАВЛЕНИЕ -->
    <div id="message"></div>
    <p>
        Добавить название: <br /> 
        <input id="username" />
    </p>


    <!-- ЧАСТЬ 2: УДАЛЕНИЕ -->
    <div id="message"></div>
    <p>
        Добавить ссылку: <br /> 
        <input id="delete" />
    </p>
    <button onclick="sendAdd()">Принять</button>
    <button onclick="sendDelete()">Список</button>
    <body>
        <hr style="margin: 30px 0;">
    </body>
    <p>
        <div id="message"></div>
        Перейти по названию: <br /> 
        <input id="enter" />
    </p>
    <button onclick="entere()">Перейти</button>


    <script>
        // Функция для ДОБАВЛЕНИЯ задачи
        async function sendAdd() {
            const username = document.getElementById("username").value;
            const deletename = document.getElementById("delete").value;
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            console.log(username)
            if (!username || !deletename) {
                alert('Заполните все поля!');
                return;
            }

            const response = await fetch("/add", {
                method: "POST",
                headers: { "Accept": "application/json", "Content-Type": "application/json", 'Authorization':'Bearer '+token},
                body: JSON.stringify({username,deletename})
            });

            if (response.ok) {
                const data = await response.json();
                document.getElementById("message").textContent = data.message;
            } else {
                console.log(response);
            }
        }

        // Функция для УДАЛЕНИЯ задачи
        async function sendDelete() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            console.log('TESTING')

            const response = await fetch("/del", {
                method: "POST",
                headers: { "Accept": "application/json", "Content-Type": "application/json", 'Authorization':'Bearer '+token},
                body: JSON.stringify({token})
            });

            if (response.ok) {
                const data = await response.json();
                window.location.href = data.redirect_url;
            } else {
                console.log(response);
            }
        }

        async function entere() {
                // 1. СНАЧАЛА получаем значения из полей
            const url = document.getElementById('enter').value;
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            console.log('ZOV ZOV 67')

    // 2. Проверяем, что поля не пустые
            if (!url) {
                alert('Заполните все поля!');
                return;
            }

    // 3. ПОТОМ отправляем запрос
            try {
                const response = await fetch('/sending?token='+token, {
                method: 'POST',
                    headers: {
                        "Accept": "application/json",'Content-Type': 'application/json', 'Authorization':'Bearer '+token
                    },
                    body: JSON.stringify({'token':token, 'url':url})
                });

                if (response.ok) {
                    const data = await response.json();
                    window.location.href = data.redirect_url;
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Ошибка авторизации');
                }
            } catch (e) {
                ;
            }
        }

    </script>
</body>
